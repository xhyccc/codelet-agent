[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mini-coding-agent-ollama"
version = "0.1.0"
description = "Minimal standalone coding agent backed by Ollama or any OpenAI-compatible API"
requires-python = ">=3.10"
dependencies = [
    "pytest>=9.0.2",
]

[project.optional-dependencies]
openai = ["openai>=1.0.0"]

[project.scripts]
mini-coding-agent = "mini_coding_agent:main"

[dependency-groups]
dev = [
  "pytest>=8.3.5",
  "ruff>=0.4.4",
]

[tool.setuptools]
py-modules = ["mini_coding_agent"]
